<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131b2e" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    <!-- Gold/Amber Gradient -->
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Rounded Square (Squircle) -->
  <rect x="16" y="16" width="480" height="480" rx="128" fill="url(#bg-glow)" stroke="url(#gold-grad)" stroke-width="16" />
  
  <!-- Stylized Crest -->
  <g filter="url(#gold-glow)">
    <!-- Shield Outline -->
    <path d="M120 120 h272 v120 c0 80-60 140-136 170 C180 380 120 320 120 240 Z" fill="none" stroke="url(#gold-grad)" stroke-width="12" stroke-linejoin="round" opacity="0.3" />
    
    <!-- Stylized Fantasy 'M' -->
    <path d="M160 350 V170 L256 266 L352 170 V350" fill="none" stroke="url(#gold-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Runic details inside M -->
    <circle cx="256" cy="160" r="14" fill="url(#gold-grad)" />
    <path d="M210 130 L256 160 L302 130" fill="none" stroke="url(#gold-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Decorative side brackets (wings/horns) -->
    <path d="M110 200 c-10-30 10-60 40-50" fill="none" stroke="url(#gold-grad)" stroke-width="10" stroke-linecap="round" />
    <path d="M402 200 c10-30-10-60-40-50" fill="none" stroke="url(#gold-grad)" stroke-width="10" stroke-linecap="round" />
    
    <!-- Bottom diamond accent -->
    <path d="M246 390 L256 405 L266 390 L256 375 Z" fill="url(#gold-grad)" />
  </g>
</svg>